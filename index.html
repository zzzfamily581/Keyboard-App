<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard App</title>
    <link rel="stylesheet" href="style.css" >
</head>
<body>
    <textarea class="textarea" id="textbox" readonly></textarea>
    <div class="keyboard">
        <div class="row1">
            <button>1</button><button>2</button><button>3</button><button>4</button><button>5</button><button>6</button><button>7</button><button>8</button><button>9</button><button>0</button>
        </div>
        <div class="row2">
            <button>q</button><button>w</button><button>e</button><button>r</button><button>t</button><button>y</button><button>u</button><button>i</button><button>o</button><button>p</button>
        </div>
        <div class="row3">
            <div></div><button>a</button><button>s</button><button>d</button><button>f</button><button>g</button><button>h</button><button>j</button><button>k</button><button>l</button>
        </div>
        <div class="row4">
            <button></button><button>z</button><button>x</button><button>c</button><button>v</button><button>b</button><button>n</button><button>m</button><button>◀▮</button>
        </div>
        <div class="row5">
            <button>?123</button><button>,</button><button>😁</button><button class="space"></button><button>.</button><button class="enter">↵</button>
        </div>
    </div>
</body>
</html>
